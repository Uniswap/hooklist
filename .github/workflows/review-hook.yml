name: Review Hook PR

on:
  pull_request:
    paths: ['hooks/**']

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: 'claude'
          show_full_output: true
          claude_args: >-
            --json-schema '{"type":"object","properties":{"review_body":{"type":"string"},"outcome":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]}},"required":["review_body","outcome"]}'
            --allowedTools "Bash(curl:*),Bash(python3:*),Read,Glob,Grep"
          prompt: |
            Review this PR by following the instructions in .claude/prompts/review-hook.md.
            Verify each hook file's flags, properties, and metadata against the on-chain source code.

            Output your review as JSON with:
            - "review_body": your full review summary (markdown)
            - "outcome": "APPROVE" if everything is correct, "REQUEST_CHANGES" if there are issues
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Post review
        if: success() && steps.claude.outputs.structured_output
        env:
          GH_TOKEN: ${{ github.token }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          OUTCOME=$(echo "$STRUCTURED_OUTPUT" | jq -r '.outcome')
          BODY=$(echo "$STRUCTURED_OUTPUT" | jq -r '.review_body')

          case "$OUTCOME" in
            APPROVE)
              gh pr review "$PR_NUMBER" --approve --body "$BODY"
              ;;
            REQUEST_CHANGES)
              gh pr review "$PR_NUMBER" --request-changes --body "$BODY"
              ;;
            *)
              gh pr review "$PR_NUMBER" --comment --body "$BODY"
              ;;
          esac
