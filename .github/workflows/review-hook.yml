name: Review Hook PR

on:
  pull_request:
    paths: ['hooks/**']

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: 'claude'
          claude_args: '--allowedTools "Bash(curl*),Bash(git*),Bash(gh*),Bash(python3*),Read,Glob,Grep"'
          prompt: |
            Review PR #${{ github.event.pull_request.number }}.
            Follow the instructions in .claude/prompts/review-hook.md to verify each hook file.

            After completing your review, submit it as a GitHub PR review using `gh`:
            - If everything is correct: `gh pr review ${{ github.event.pull_request.number }} --approve --body "<your summary>"`
            - If there are issues: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<your findings>"`
        env:
          GH_TOKEN: ${{ github.token }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
