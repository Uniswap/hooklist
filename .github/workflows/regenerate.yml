name: Regenerate Registry

on:
  push:
    branches: [main]
    paths: ['hooks/**']

concurrency:
  group: regenerate-registry
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.REGISTRY_APP_ID }}
          private-key: ${{ secrets.REGISTRY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate hooklist.json
        run: python scripts/aggregate.py

      - name: Commit and push
        run: |
          git config user.name "hook-registry-bot[bot]"
          git config user.email "hook-registry-bot[bot]@users.noreply.github.com"
          git add hooklist.json
          git diff --staged --quiet || git commit -m "chore: regenerate hooklist.json"
          git push
