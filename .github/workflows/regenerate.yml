name: Regenerate Registry

on:
  push:
    branches: [main]
    paths: ['hooks/**']

concurrency:
  group: regenerate-registry
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547
        with:
          app-id: ${{ vars.REGISTRY_APP_ID }}
          private-key: ${{ secrets.REGISTRY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate hooklist.json
        run: python scripts/aggregate.py

      - name: Copy to site public
        run: |
          cp hooklist.json site/public/hooklist.json
          cp hooklist-vanilla-swap.json site/public/hooklist-vanilla-swap.json

      - name: Commit and push
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "hook-registry-bot[bot]"
          git config user.email "hook-registry-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git add hooklist.json hooklist-vanilla-swap.json site/public/hooklist.json site/public/hooklist-vanilla-swap.json
          git diff --staged --quiet || git commit -m "chore: regenerate hooklist.json"
          git push
