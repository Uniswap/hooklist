name: Validate Hook Files

on:
  pull_request:

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for hook changes
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          HOOKS_CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- 'hooks/**' | head -1)
          if [ -n "$HOOKS_CHANGED" ]; then
            echo "hooks=true" >> "$GITHUB_OUTPUT"
          else
            echo "hooks=false" >> "$GITHUB_OUTPUT"
            echo "No hook files changed, skipping validation."
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        if: steps.changed.outputs.hooks == 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.changed.outputs.hooks == 'true'
        run: pip install -r requirements.txt

      - name: Validate hook files against schema
        if: steps.changed.outputs.hooks == 'true'
        run: python scripts/validate.py

      - name: Verify flags match address bitmask
        if: steps.changed.outputs.hooks == 'true'
        run: python scripts/verify_flags.py
